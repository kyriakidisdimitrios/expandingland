<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discord Login - Expanding Land</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0e17;
      color: #c8d6e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #111827;
      border-radius: 12px;
      padding: 40px;
      border: 1px solid #1e293b;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    h2 { color: #5865F2; margin-bottom: 8px; }
    .status { color: #64748b; margin-bottom: 20px; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #1e293b;
      border-top: 4px solid #5865F2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #5865F2;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1em;
    }
    .error { color: #f87171; }
    .info { color: #64748b; font-size: 0.85em; margin-top: 16px; }
    #debug { text-align: left; font-family: monospace; font-size: 11px; color: #4ade80;
             background: #0d1117; padding: 12px; border-radius: 8px; margin-top: 16px;
             max-height: 200px; overflow-y: auto; white-space: pre-wrap; }
    #success { display: none; }
    #loading { display: block; }
    #error-msg { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <div class="spinner"></div>
      <p class="status">Connecting to Discord...</p>
    </div>
    <div id="error-msg">
      <h2 class="error">Login Failed</h2>
      <p class="status" id="error-text"></p>
      <br>
      <a href="https://expanding.land" class="btn">Back to Game</a>
    </div>
    <div id="success">
      <h2>✅ Discord Linked!</h2>
      <p class="status">Closing this window...</p>
      <p class="info">If this window doesn't close, <a href="https://expanding.land" class="btn" style="padding:8px 16px;font-size:0.9em">Return to Game</a></p>
    </div>
    <div id="debug"></div>
  </div>

  <script>
    var debugEl = document.getElementById('debug');
    function dbg(msg) {
      console.log('[CALLBACK] ' + msg);
      debugEl.textContent += msg + '\n';
    }

    (function() {
      dbg('Callback page loaded');
      dbg('URL: ' + window.location.href);
      dbg('Search: ' + window.location.search);
      dbg('Hash: ' + window.location.hash);

      var urlParams = new URLSearchParams(window.location.search);
      var code = urlParams.get('code');
      var error = urlParams.get('error');

      dbg('code param: ' + (code ? code.substring(0, 20) + '...' : 'null'));
      dbg('error param: ' + error);

      if (error) {
        var desc = urlParams.get('error_description') || error;
        dbg('ERROR from Discord: ' + desc);
        showError('Discord denied access: ' + desc);
        return;
      }

      if (!code) {
        dbg('ERROR: No code in URL params');
        showError('No authorization code received. Please try logging in again.');
        return;
      }

      dbg('Got authorization code! Length=' + code.length);

      /* Build Discord user data with the code as token */
      var discordData = {
        id: 'discord_' + code.substring(0, 16),
        username: 'Discord User',
        globalName: 'Discord User',
        avatar: '',
        email: '',
        token: code
      };

      /* Method 1: postMessage to parent window (bypasses storage partitioning) */
      dbg('window.opener exists: ' + !!window.opener);
      if (window.opener) {
        try {
          var msg = { type: 'legendmod_discord_login', data: discordData };
          window.opener.postMessage(msg, '*');
          dbg('postMessage sent to opener!');
        } catch(e) {
          dbg('postMessage FAILED: ' + e.message);
        }
      }

      /* Method 2: localStorage (fallback — may not work due to storage partitioning) */
      dbg('Saving to localStorage...');
      try {
        localStorage.setItem('legendmod_discord', JSON.stringify(discordData));
        dbg('localStorage SET OK');
        var verify = localStorage.getItem('legendmod_discord');
        dbg('localStorage GET verify: ' + (verify ? 'OK (' + verify.length + ' bytes)' : 'FAILED'));
      } catch(e) {
        dbg('localStorage FAILED: ' + e.message);
      }

      /* Show success */
      document.getElementById('loading').style.display = 'none';
      document.getElementById('success').style.display = 'block';
      dbg('Success! Closing popup in 2s...');

      setTimeout(function() {
        dbg('Calling window.close()');
        window.close();
      }, 2000);
    })();

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('error-text').textContent = msg;
    }
  </script>
</body>
</html>
