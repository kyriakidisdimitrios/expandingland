<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discord Login - Expanding Land</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0e17;
      color: #c8d6e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #111827;
      border-radius: 12px;
      padding: 40px;
      border: 1px solid #1e293b;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    h2 { color: #5865F2; margin-bottom: 8px; }
    .status { color: #64748b; margin-bottom: 20px; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #1e293b;
      border-top: 4px solid #5865F2;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #5865F2;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1em;
    }
    .error { color: #f87171; }
    .info { color: #64748b; font-size: 0.85em; margin-top: 16px; }
    #debug { text-align: left; font-family: monospace; font-size: 11px; color: #4ade80;
             background: #0d1117; padding: 12px; border-radius: 8px; margin-top: 16px;
             max-height: 200px; overflow-y: auto; white-space: pre-wrap; }
    #loading { display: block; }
    #error-msg { display: none; }
  </style>
</head>
<body>
  <div class="card">
      <img src="https://jimboy3100.github.io/banners/icon128croped.gif" alt="LegendMod" style="width:64px;height:64px;margin-bottom:16px;border-radius:12px;">
    <div id="loading">
      <div class="spinner"></div>
      <p class="status">Connecting to Discord...</p>
    </div>
    <div id="error-msg">
      <h2 class="error">Login Failed</h2>
      <p class="status" id="error-text"></p>
      <br>
      <a href="https://expanding.land" class="btn">Back to Game</a>
    </div>
    <div id="debug"></div>
  </div>

  <script>
    var debugEl = document.getElementById('debug');
    function dbg(msg) {
      console.log('[CALLBACK] ' + msg);
      debugEl.textContent += msg + '\n';
    }

    (function() {
      dbg('Callback page loaded');
      dbg('URL: ' + window.location.href);

      var urlParams = new URLSearchParams(window.location.search);
      var code = urlParams.get('code');
      var error = urlParams.get('error');
      var state = urlParams.get('state');

      dbg('code param: ' + (code ? code.substring(0, 20) + '...' : 'null'));
      dbg('error param: ' + error);
      dbg('state param: ' + state);

      if (error) {
        var desc = urlParams.get('error_description') || error;
        dbg('ERROR from Discord: ' + desc);
        showError('Discord denied access: ' + desc);
        return;
      }

      if (!code) {
        dbg('ERROR: No code in URL params');
        showError('No authorization code received. Please try logging in again.');
        return;
      }

      dbg('Got authorization code! Length=' + code.length);

      /* Redirect to the same-origin relay page on the game's domain.
       * The state parameter tells us which origin opened the popup.
       * The relay page is on the same origin as the game, so localStorage
       * and BroadcastChannel work perfectly. */
      var allowedOrigins = [
        'https://jimboy3100.github.io',
        'https://legendmod.ml'
      ];
      var targetOrigin = 'https://jimboy3100.github.io'; /* default */
      /* Note: URLSearchParams.get() already URL-decodes, so no decodeURIComponent needed */
      if (state && allowedOrigins.indexOf(state) !== -1) {
        targetOrigin = state;
      }

      var relayUrl = targetOrigin + '/auth/discord/relay.html?code=' + encodeURIComponent(code);
      dbg('Redirecting to relay: ' + relayUrl);
      window.location.href = relayUrl;
    })();

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('error-text').textContent = msg;
    }
  </script>
</body>
</html>
